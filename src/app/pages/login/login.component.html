<div class="login-container">
  <mat-card class="login-card">

    <mat-card-header>
      <mat-card-title>🐾 Clínica Veterinária</mat-card-title>
      <mat-card-subtitle>Acesse sua conta</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="entrar()">

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Usuário</mat-label>
          <input matInput formControlName="username" autocomplete="username">
          <mat-icon matSuffix>person</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Senha</mat-label>
          <input matInput [type]="senhaVisivel ? 'text' : 'password'" formControlName="password" autocomplete="current-password">
          <mat-icon matSuffix (click)="senhaVisivel = !senhaVisivel" style="cursor:pointer">
            {{ senhaVisivel ? 'visibility_off' : 'visibility' }}
          </mat-icon>
        </mat-form-field>

        <p class="erro" *ngIf="erro">{{ erro }}</p>

        <button mat-raised-button color="primary" type="submit" class="full-width" [disabled]="loading">
          <mat-spinner diameter="20" *ngIf="loading"></mat-spinner>
          <span *ngIf="!loading">Entrar</span>
        </button>

      </form>
    </mat-card-content>

  </mat-card>
</div>

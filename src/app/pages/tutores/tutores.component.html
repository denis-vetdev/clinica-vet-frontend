<div class="page-container">

  <div class="page-header">
    <mat-form-field appearance="outline" class="busca">
      <mat-label>Buscar tutor</mat-label>
      <input matInput (input)="buscar($event)" placeholder="Nome, CPF ou e-mail">
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
    <button mat-raised-button color="primary" (click)="abrirFormulario()">
      <mat-icon>add</mat-icon> Novo Tutor
    </button>
  </div>

  <!-- Formulário -->
  <mat-card *ngIf="mostrarFormulario" class="formulario">
    <mat-card-title>{{ editando ? 'Editar Tutor' : 'Novo Tutor' }}</mat-card-title>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="salvar()">
        <div class="form-grid">
          <mat-form-field appearance="outline">
            <mat-label>Nome</mat-label>
            <input matInput formControlName="nome">
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>CPF</mat-label>
            <input matInput formControlName="cpf">
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Telefone</mat-label>
            <input matInput formControlName="telefone">
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>E-mail</mat-label>
            <input matInput formControlName="email">
          </mat-form-field>
        </div>

        <div class="form-acoes">
          <button mat-button type="button" (click)="fecharFormulario()">Cancelar</button>
          <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">Salvar</button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>

  <!-- Tabela -->
  <mat-card>
    <mat-card-content>
      <div *ngIf="loading" class="spinner-container">
        <mat-spinner diameter="40"></mat-spinner>
      </div>

      <table mat-table [dataSource]="tutores" *ngIf="!loading">
        <ng-container matColumnDef="nome">
          <th mat-header-cell *matHeaderCellDef>Nome</th>
          <td mat-cell *matCellDef="let t">{{ t.nome }}</td>
        </ng-container>

        <ng-container matColumnDef="cpf">
          <th mat-header-cell *matHeaderCellDef>CPF</th>
          <td mat-cell *matCellDef="let t">{{ t.cpf }}</td>
        </ng-container>

        <ng-container matColumnDef="telefone">
          <th mat-header-cell *matHeaderCellDef>Telefone</th>
          <td mat-cell *matCellDef="let t">{{ t.telefone }}</td>
        </ng-container>

        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef>E-mail</th>
          <td mat-cell *matCellDef="let t">{{ t.email }}</td>
        </ng-container>

        <ng-container matColumnDef="total_animais">
          <th mat-header-cell *matHeaderCellDef>Animais</th>
          <td mat-cell *matCellDef="let t">{{ t.total_animais }}</td>
        </ng-container>

        <ng-container matColumnDef="acoes">
          <th mat-header-cell *matHeaderCellDef>Ações</th>
          <td mat-cell *matCellDef="let t">
            <button mat-icon-button color="primary" (click)="abrirFormulario(t)">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="deletar(t.id!)">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="colunas"></tr>
        <tr mat-row *matRowDef="let row; columns: colunas;"></tr>
      </table>

      <p *ngIf="!loading && tutores.length === 0" class="vazio">Nenhum tutor encontrado.</p>
    </mat-card-content>
  </mat-card>

</div>
